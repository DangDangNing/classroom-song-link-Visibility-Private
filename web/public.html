<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一起点歌</title><style>
:root{font-family:"Microsoft YaHei",Arial,sans-serif;color:#19332e;background:#f3f7f2}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box}.card{width:min(100%,560px);background:#fff;border-radius:20px;padding:32px;box-shadow:0 16px 48px #173d3020}h1{margin:0 0 8px;font-size:32px}.hint{color:#61736e;margin:0 0 26px}label{display:grid;gap:7px;font-weight:700;margin:14px 0}input{font:inherit;padding:13px;border:1px solid #c9d4cf;border-radius:10px}button{font:inherit;font-weight:700;border:0;border-radius:10px;padding:13px 16px;background:#176b56;color:white;cursor:pointer}button.alt{background:#e6f0eb;color:#174a3d}.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.buttons button{flex:1}.notice{min-height:24px;margin:15px 0 0;font-weight:700}.list{margin:22px 0 0;padding:0;list-style:none;display:grid;gap:8px}.list li{padding:12px;background:#f4f8f5;border-radius:10px}.list small{display:block;color:#687871;margin-top:4px}.share{font-size:13px;color:#687871;margin:16px 0 0;overflow-wrap:anywhere}</style></head><body><main class="card"><h1>点一首歌</h1><p class="hint">写下歌名，主持人会在队列里看到它。</p><form id="request-form"><label>歌名 / 歌手 / 链接<input name="title" maxlength="120" required autofocus placeholder="例如：周杰伦 晴天"></label><label>你的名字（可不填）<input name="requester" maxlength="40" placeholder="匿名"></label><button>加入歌单</button></form><p class="notice" id="notice" aria-live="polite"></p><div class="buttons"><button class="alt" id="directory" type="button">查看当前点歌目录</button><button class="alt" id="share" type="button">复制分享链接</button></div><p class="share" id="share-url">__SHARE_URL__</p><ol class="list" id="songs" hidden></ol></main><script>
const songs=document.querySelector('#songs'),notice=document.querySelector('#notice');
function addSong(song){const li=document.createElement('li'),title=document.createElement('strong'),meta=document.createElement('small');title.textContent=song.title+(song.done?'（已播）':'');meta.textContent=(song.requester||'匿名')+' 点的';li.append(title,meta);songs.append(li)}
async function loadSongs(){const response=await fetch('/api/songs'),data=await response.json();songs.replaceChildren();data.forEach(addSong);if(!data.length){const li=document.createElement('li');li.textContent='还没有人点歌。';songs.append(li)}songs.hidden=false}
document.querySelector('#directory').addEventListener('click',()=>loadSongs().catch(()=>notice.textContent='暂时无法加载目录。'));
document.querySelector('#share').addEventListener('click',async()=>{const url=document.querySelector('#share-url').textContent;try{await navigator.clipboard.writeText(url);notice.textContent='分享链接已复制，发给同一 Wi‑Fi 的朋友即可。'}catch{notice.textContent='请手动复制下方链接。'}});
document.querySelector('#request-form').addEventListener('submit',async event=>{event.preventDefault();const response=await fetch('/api/request',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(new FormData(event.currentTarget))});const data=await response.json();if(!response.ok){notice.textContent=data.error||'提交失败，请重试。';return}notice.textContent='已加入歌单：'+data.title;event.currentTarget.reset();loadSongs()});
</script></body></html>
